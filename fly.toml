# fly.toml app configuration file generated for ntngame on 2026-06-08T10:10:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ntngame'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
